function draw(px, pal, sc) {
  const H=px.length, W=px[0].length;
  const c=document.createElement('canvas');
  c.width=W*sc; c.height=H*sc;
  const ctx=c.getContext('2d'); ctx.imageSmoothingEnabled=false;
  for(let y=0;y<H;y++) for(let x=0;x<W;x++){
    const ci=px[y][x]; if(!ci) continue;
    ctx.fillStyle=pal[ci];
    ctx.fillRect(x*sc,y*sc,sc,sc);
  }
  return c;
}

function getCanvas(item){ return draw(item.px,item.pal,SC); }

function dlOne(item){
  const c=getCanvas(item);
  const a=document.createElement('a');
  a.download=item.id+'.png';
  a.href=c.toDataURL('image/png');
  a.click();
}

async function dlAll(){
  const zip=new JSZip();
  for(const item of ITEMS){
    const c=getCanvas(item);
    const base64=c.toDataURL('image/png').split(',')[1];
    zip.file(item.id+'.png',base64,{base64:true});
  }
  const blob=await zip.generateAsync({type:'blob'});
  const a=document.createElement('a');
  a.download='new_item_icons.zip';
  a.href=URL.createObjectURL(blob);
  a.click();
}
